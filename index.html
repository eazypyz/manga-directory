<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Directory - Komunitas Direktori Situs Manga</title>
    <meta name="description" content="Direktori situs manga berbasis komunitas. Temukan situs baca manga terbaik dalam berbagai bahasa.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <meta name="google-site-verification" content="sEcHO3-xuEVcHVgIzN1kGKxBPFaWS1j7xNrA-6S7ei0" />
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">📚</span>
                    <div class="logo-text">
                        <h1>Manga Directory</h1>
                        <span class="logo-subtitle">Komunitas Direktori Situs Manga</span>
                    </div>
                </div>
                <div class="header-actions">
                    <a href="https://github.com/eazypyz/manga-directory" target="_blank" rel="noopener" class="btn btn-github">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-[...]
                        GitHub
                    </a>
                    <a href="https://github.com/eazypyz/manga-directory/issues/new?template=add-site.md" target="_blank" rel="noopener" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="1[...]
                        Tambah Situs
                    </a>
                </div>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stats-content">
                <div class="stat-item">
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-label">Total Situs</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-online">0</span>
                    <span class="stat-label">Online</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-offline">0</span>
                    <span class="stat-label">Offline</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-languages">0</span>
                    <span class="stat-label">Bahasa</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-countries">0</span>
                    <span class="stat-label">Negara</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main">
            <!-- Search & Filter Section -->
            <section class="controls-section">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx[...]
                    <input type="text" id="search-input" placeholder="Cari situs manga..." autocomplete="off">
                    <button class="search-clear" id="search-clear" style="display:none">×</button>
                </div>

                <div class="filters-row">
                    <div class="filter-group">
                        <label>Bahasa</label>
                        <select id="filter-language">
                            <option value="">Semua Bahasa</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Negara</label>
                        <select id="filter-country">
                            <option value="">Semua Negara</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Genre</label>
                        <select id="filter-genre">
                            <option value="">Semua Genre</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="filter-status">
                            <option value="">Semua Status</option>
                            <option value="online">Online</option>
                            <option value="offline">Offline</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Urutkan</label>
                        <select id="sort-by">
                            <option value="name">Nama</option>
                            <option value="newest">Terbaru</option>
                            <option value="popularity">Popularitas</option>
                        </select>
                    </div>
                    <button class="btn btn-ghost" id="reset-filters">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 1[...]
                        Reset
                    </button>
                </div>

                <div class="active-filters" id="active-filters"></div>
            </section>

            <!-- Results Info -->
            <div class="results-info">
                <span id="results-count">Memuat data...</span>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" title="Grid View">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="[...]
                    </button>
                    <button class="view-btn" data-view="list" title="List View">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="2[...]
                    </button>
                </div>
            </div>

            <!-- Loading Skeleton -->
            <div class="skeleton-grid" id="skeleton-loader">
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skelet[...]
            </div>

            <!-- Sites Grid -->
            <div class="sites-grid" id="sites-grid" style="display:none"></div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display:none">
                <div class="empty-icon">🔍</div>
                <h3>Tidak ada hasil</h3>
                <p>Coba ubah filter atau kata kunci pencarian Anda.</p>
                <button class="btn btn-primary" id="clear-search">Bersihkan Filter</button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p> Manga Directory. Data dikelola oleh komunitas.</p>
                <div class="footer-links">
                    <a href="https://github.com/eazypyz/manga-directory" target="_blank" rel="noopener">GitHub</a>
                    <a href="https://github.com/eazypyz/manga-directory/issues/new?template=add-site.md" target="_blank" rel="noopener">Tambah Situs</a>
                    <a href="https://github.com/eazypyz/manga-directory/blob/main/README.md" target="_blank" rel="noopener">Dokumentasi</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
