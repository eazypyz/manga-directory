<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Directory - Komunitas Direktori Situs Manga</title>
    <meta name="description" content="Direktori situs manga berbasis komunitas. Temukan situs baca manga terbaik dalam berbagai bahasa.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">📚</span>
                    <div class="logo-text">
                        <h1>Manga Directory</h1>
                        <span class="logo-subtitle">Komunitas Direktori Situs Manga</span>
                    </div>
                </div>
                <div class="header-actions">
                    <a href="https://github.com/YOUR_USERNAME/manga-directory" target="_blank" rel="noopener" class="btn btn-github">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        GitHub
                    </a>
                    <a href="https://github.com/YOUR_USERNAME/manga-directory/issues/new?template=add-site.md" target="_blank" rel="noopener" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Tambah Situs
                    </a>
                </div>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stats-content">
                <div class="stat-item">
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-label">Total Situs</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-online">0</span>
                    <span class="stat-label">Online</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-offline">0</span>
                    <span class="stat-label">Offline</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-languages">0</span>
                    <span class="stat-label">Bahasa</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-countries">0</span>
                    <span class="stat-label">Negara</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main">
            <!-- Search & Filter Section -->
            <section class="controls-section">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Cari situs manga..." autocomplete="off">
                    <button class="search-clear" id="search-clear" style="display:none">×</button>
                </div>

                <div class="filters-row">
                    <div class="filter-group">
                        <label>Bahasa</label>
                        <select id="filter-language">
                            <option value="">Semua Bahasa</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Negara</label>
                        <select id="filter-country">
                            <option value="">Semua Negara</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Genre</label>
                        <select id="filter-genre">
                            <option value="">Semua Genre</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="filter-status">
                            <option value="">Semua Status</option>
                            <option value="online">Online</option>
                            <option value="offline">Offline</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Urutkan</label>
                        <select id="sort-by">
                            <option value="name">Nama</option>
                            <option value="newest">Terbaru</option>
                            <option value="popularity">Popularitas</option>
                        </select>
                    </div>
                    <button class="btn btn-ghost" id="reset-filters">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                        Reset
                    </button>
                </div>

                <div class="active-filters" id="active-filters"></div>
            </section>

            <!-- Results Info -->
            <div class="results-info">
                <span id="results-count">Memuat data...</span>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid" title="Grid View">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </button>
                    <button class="view-btn" data-view="list" title="List View">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    </button>
                </div>
            </div>

            <!-- Loading Skeleton -->
            <div class="skeleton-grid" id="skeleton-loader">
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-header"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-tags"></div></div></div>
            </div>

            <!-- Sites Grid -->
            <div class="sites-grid" id="sites-grid" style="display:none"></div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display:none">
                <div class="empty-icon">🔍</div>
                <h3>Tidak ada hasil</h3>
                <p>Coba ubah filter atau kata kunci pencarian Anda.</p>
                <button class="btn btn-primary" id="clear-search">Bersihkan Filter</button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p> Manga Directory. Data dikelola oleh komunitas.</p>
                <div class="footer-links">
                    <a href="https://github.com/YOUR_USERNAME/manga-directory" target="_blank" rel="noopener">GitHub</a>
                    <a href="https://github.com/YOUR_USERNAME/manga-directory/issues/new?template=add-site.md" target="_blank" rel="noopener">Tambah Situs</a>
                    <a href="https://github.com/YOUR_USERNAME/manga-directory/blob/main/README.md" target="_blank" rel="noopener">Dokumentasi</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
